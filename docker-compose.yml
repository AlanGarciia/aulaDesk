services:
  auladesk_php:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: alan
        uid: 1000
    container_name: auladesk_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - auladesk_db                     # ← afegit: que arrenqui després de la BD
    networks:
      - prova_competencial_network

  auladesk_db:
    image: mariadb:10.4
    container_name: auladesk_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: auladesk
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    volumes:
      - auladesk_db_data:/var/lib/mysql  # ← millor named volume que ./mariadb
    networks:
      - prova_competencial_network

  auladesk_nginx:
    image: nginx:stable-alpine
    container_name: auladesk_nginx
    restart: unless-stopped
    depends_on:
      - auladesk_php
    volumes:
      - ./:/var/www
      - ./nginx:/etc/nginx/conf.d
    environment:
      - VIRTUAL_HOST=auladesk.duckdns.org
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=auladesk.duckdns.org
      - LETSENCRYPT_EMAIL=alansioelgrasias@gmail.com
    networks:
      - prova_competencial_network

volumes:
  auladesk_db_data:

networks:
  prova_competencial_network:
    external: true
